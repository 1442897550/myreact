<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能对话 - 调试版</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/marked/9.1.2/marked.min.js"></script>
    <link rel="stylesheet" th:href="@{/css/chat.css(t=${timestamp})}">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 智能对话助手</h1>
        </div>

        <div id="chatBox" class="chat-box">
            <div class="message system">
                <div class="message-content">欢迎使用智能对话！请输入您的问题...</div>
            </div>
        </div>

        <div class="input-area">
            <textarea id="userInput" placeholder="输入您的问题，按 Enter 发送（Shift+Enter 换行）" rows="2"></textarea>
            <button id="sendBtn">发送</button>
        </div>
    </div>

    <div class="debug-panel">
        <div class="debug-header">
            <h3>📋 调试日志</h3>
            <button class="debug-toggle" id="debugToggle" title="展开/收起">▼</button>
        </div>
        <div id="debugLog" class="debug-log"></div>
    </div>

    <script th:src="@{/js/chat.js(t=${timestamp})}"></script>
</body>
</html>
