<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能对话 - 调试版</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background: #1f2937;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            padding: 20px;
            text-align: center;
        }
        .header h1 {
            color: white;
            font-size: 1.5rem;
            font-weight: 600;
        }
        .chat-box {
            height: 500px;
            overflow-y: auto;
            padding: 20px;
            background: #111827;
        }
        .chat-box::-webkit-scrollbar {
            width: 8px;
        }
        .chat-box::-webkit-scrollbar-track {
            background: #1f2937;
        }
        .chat-box::-webkit-scrollbar-thumb {
            background: #3b82f6;
            border-radius: 4px;
        }
        .message {
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
        }
        .message.user {
            align-items: flex-end;
        }
        .message.assistant {
            align-items: flex-start;
        }
        .message-content {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            word-break: break-word;
            line-height: 1.5;
        }
        .message.user .message-content {
            background: #3b82f6;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message.assistant .message-content {
            background: #374151;
            color: #e5e7eb;
            border-bottom-left-radius: 4px;
        }
        .message.assistant .message-content.markdown-body {
            white-space: normal;
        }
        .message.error .message-content {
            background: #dc2626;
            color: white;
        }
        .message.system .message-content {
            background: transparent;
            color: #6b7280;
            font-size: 0.85rem;
            text-align: center;
        }
        .input-area {
            padding: 20px;
            background: #1f2937;
            border-top: 1px solid #374151;
            display: flex;
            gap: 12px;
        }
        #userInput {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #374151;
            border-radius: 12px;
            background: #111827;
            color: #e5e7eb;
            font-size: 1rem;
            resize: none;
            min-height: 50px;
            max-height: 150px;
        }
        #userInput:focus {
            outline: none;
            border-color: #3b82f6;
        }
        #sendBtn {
            padding: 12px 24px;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }
        #sendBtn:hover:not(:disabled) {
            transform: translateY(-2px);
        }
        #sendBtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .debug-panel {
            margin-top: 20px;
            width: 100%;
            max-width: 800px;
            background: #1f2937;
            border-radius: 12px;
            overflow: hidden;
        }
        .debug-header {
            background: #374151;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .debug-header h3 {
            color: #9ca3af;
            font-size: 0.9rem;
            font-weight: 600;
        }
        .debug-toggle {
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            font-size: 1.2rem;
        }
        .debug-log {
            height: 200px;
            overflow-y: auto;
            padding: 12px;
            background: #0f172a;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.8rem;
        }
        .debug-log.hidden {
            display: none;
        }
        .log-entry {
            margin-bottom: 4px;
            padding: 4px 8px;
            border-radius: 4px;
        }
        .log-entry.info { color: #60a5fa; }
        .log-entry.success { color: #34d399; }
        .log-entry.warn { color: #fbbf24; }
        .log-entry.error { color: #f87171; background: rgba(248, 113, 113, 0.1); }
        .log-entry.data { color: #a78bfa; }
        .log-timestamp {
            color: #6b7280;
            margin-right: 8px;
        }
        
        /* Markdown 样式 */
        .markdown-body { line-height: 1.6; }
        .markdown-body p { margin: 0.5em 0; }
        .markdown-body p:first-child { margin-top: 0; }
        .markdown-body p:last-child { margin-bottom: 0; }
        .markdown-body pre {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px 16px;
            overflow-x: auto;
            margin: 8px 0;
        }
        .markdown-body code {
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 0.9em;
        }
        .markdown-body :not(pre) > code {
            background: #374151;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .markdown-body blockquote {
            border-left: 3px solid #3b82f6;
            padding-left: 12px;
            margin: 8px 0;
            color: #9ca3af;
        }
        .markdown-body ul, .markdown-body ol {
            margin: 8px 0;
            padding-left: 24px;
        }
        .markdown-body li { margin: 4px 0; }
        .markdown-body h1, .markdown-body h2, .markdown-body h3, 
        .markdown-body h4, .markdown-body h5, .markdown-body h6 {
            margin: 12px 0 8px;
            font-weight: 600;
            line-height: 1.3;
        }
        .markdown-body h1 { font-size: 1.5em; }
        .markdown-body h2 { font-size: 1.3em; }
        .markdown-body h3 { font-size: 1.1em; }
        .markdown-body h4 { font-size: 1em; }
        .markdown-body a {
            color: #60a5fa;
            text-decoration: none;
        }
        .markdown-body a:hover { text-decoration: underline; }
        .markdown-body table {
            border-collapse: collapse;
            width: 100%;
            margin: 8px 0;
        }
        .markdown-body th, .markdown-body td {
            border: 1px solid #374151;
            padding: 8px 12px;
        }
        .markdown-body th { background: #374151; }
        .markdown-body hr {
            border: none;
            border-top: 1px solid #374151;
            margin: 12px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 智能对话助手</h1>
        </div>
        
        <div id="chatBox" class="chat-box">
            <div class="message system">
                <div class="message-content">欢迎使用智能对话！请输入您的问题...</div>
            </div>
        </div>
        
        <div class="input-area">
            <textarea id="userInput" placeholder="输入您的问题，按 Enter 发送（Shift+Enter 换行）" rows="2"></textarea>
            <button id="sendBtn">发送</button>
        </div>
    </div>
    
    <div class="debug-panel">
        <div class="debug-header">
            <h3>📋 调试日志</h3>
            <button class="debug-toggle" id="debugToggle" title="展开/收起">▼</button>
        </div>
        <div id="debugLog" class="debug-log"></div>
    </div>

    <script>
        // ==================== 调试工具 ====================
        const Debug = {
            log: function(type, message, data) {
                const logEl = document.getElementById('debugLog');
                const timestamp = new Date().toLocaleTimeString('zh-CN', { 
                    hour12: false, 
                    hour: '2-digit', 
                    minute: '2-digit', 
                    second: '2-digit',
                    fractionalSecondDigits: 3
                });
                
                let content = `<span class="log-timestamp">[${timestamp}]</span>`;
                content += `<strong>[${type.toUpperCase()}]</strong> ${escapeHtml(message)}`;
                
                if (data !== undefined) {
                    content += `<br><span style="color: #6b7280;">${escapeHtml(JSON.stringify(data, null, 2))}</span>`;
                }
                
                const entry = document.createElement('div');
                entry.className = `log-entry ${type}`;
                entry.innerHTML = content;
                logEl.appendChild(entry);
                logEl.scrollTop = logEl.scrollHeight;
                
                console.log(`[${type}] ${message}`, data || '');
            },
            info: function(msg, data) { this.log('info', msg, data); },
            success: function(msg, data) { this.log('success', msg, data); },
            warn: function(msg, data) { this.log('warn', msg, data); },
            error: function(msg, data) { this.log('error', msg, data); },
            data: function(msg, data) { this.log('data', msg, data); }
        };

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ==================== Markdown 渲染 ====================
        function renderMarkdown(text) {
            if (typeof marked !== 'undefined') {
                return marked.parse(text, { gfm: true, breaks: true });
            }
            // 降级处理：纯文本
            return escapeHtml(text).replace(/\n/g, '<br>');
        }

        // ==================== 聊天功能 ====================
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const debugToggle = document.getElementById('debugToggle');
        const debugLog = document.getElementById('debugLog');

        let isSending = false;
        let renderTimer = null;
        let pendingContent = '';
        let currentMsgDiv = null;

        // 切换调试面板
        debugToggle.addEventListener('click', function() {
            const isHidden = debugLog.classList.toggle('hidden');
            debugToggle.textContent = isHidden ? '▶' : '▼';
        });

        // 添加消息到聊天框
        function addMessage(role, content, isMarkdown = false) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content' + (isMarkdown ? ' markdown-body' : '');
            
            if (isMarkdown) {
                contentDiv.innerHTML = renderMarkdown(content);
            } else {
                contentDiv.textContent = content;
            }
            
            msgDiv.appendChild(contentDiv);
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
            return msgDiv;
        }

        // 更新助手消息内容（用于流式更新）
        function updateAssistantMessage(content) {
            if (!currentMsgDiv) return;
            const contentDiv = currentMsgDiv.querySelector('.message-content');
            if (contentDiv) {
                contentDiv.innerHTML = renderMarkdown(content);
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        // 防抖渲染：避免频繁解析 Markdown
        function scheduleRender(content) {
            pendingContent = content;
            if (renderTimer) return;
            
            renderTimer = setTimeout(function() {
                updateAssistantMessage(pendingContent);
                renderTimer = null;
            }, 50); // 50ms 防抖
        }

        // 发送聊天请求
        function sendChat() {
            const question = userInput.value.trim();
            if (!question || isSending) return;

            // 添加用户消息
            addMessage('user', question);
            userInput.value = '';
            
            // 创建助手消息占位
            currentMsgDiv = addMessage('assistant', '思考中...');
            
            // 禁用输入
            isSending = true;
            sendBtn.disabled = true;
            userInput.disabled = true;

            Debug.info('开始发送请求', { question: question });

            const url = '/api/chat/stream';
            Debug.info('连接 SSE 端点', { url: url });

            fetchWithStream(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: generateSessionId(), question: question })
            });
        }

        function generateSessionId() {
            return 'sess_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        }

        async function fetchWithStream(url, options) {
            let accumulatedContent = '';
            let chunkCount = 0;
            let firstChunkTime = null;
            let lastChunkTime = null;
            let buffer = '';

            try {
                Debug.info('发起 fetch 请求');
                const response = await fetch(url, options);
                
                Debug.info('收到响应', { 
                    status: response.status, 
                    statusText: response.statusText,
                    contentType: response.headers.get('content-type')
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText}`);
                }

                if (!response.body) {
                    throw new Error('浏览器不支持 ReadableStream');
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder('utf-8');

                Debug.success('成功获取响应流，开始读取数据...');

                while (true) {
                    Debug.info('等待读取下一个数据块...');
                    const { done, value } = await reader.read();
                    
                    if (done) {
                        Debug.success('流读取完成');
                        break;
                    }

                    const chunkTime = Date.now();
                    if (!firstChunkTime) firstChunkTime = chunkTime;
                    lastChunkTime = chunkTime;
                    chunkCount++;

                    const chunk = decoder.decode(value, { stream: true });
                    Debug.data(`收到数据块 #${chunkCount}`, { 
                        raw: chunk,
                        byteLength: value.length
                    });

                    buffer += chunk;
                    
                    // 处理 SSE 格式
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        const trimmedLine = line.trim();
                        if (!trimmedLine) continue;
                        
                        if (trimmedLine.startsWith('data:')) {
                            const dataStr = trimmedLine.slice(5).trim();
                            Debug.info('解析 SSE data 行', { dataStr: dataStr });
                            
                            try {
                                const payload = JSON.parse(dataStr);
                                Debug.data('解析 JSON payload', payload);
                                
                                if (payload.type === 'content' && payload.data) {
                                    accumulatedContent += payload.data;
                                    scheduleRender(accumulatedContent);
                                    Debug.success('累积内容', { 
                                        length: accumulatedContent.length
                                    });
                                } else if (payload.type === 'error') {
                                    Debug.error('收到错误消息', payload);
                                    updateAssistantMessage('❌ 错误：' + payload.data);
                                } else if (payload.type === 'done') {
                                    Debug.success('收到完成信号');
                                }
                            } catch (e) {
                                Debug.warn('JSON 解析失败', { error: e.message, data: dataStr });
                                accumulatedContent += dataStr;
                                scheduleRender(accumulatedContent);
                            }
                        }
                    }
                }

                // 处理剩余缓冲
                if (buffer.trim() && buffer.startsWith('data:')) {
                    const dataStr = buffer.slice(5).trim();
                    try {
                        const payload = JSON.parse(dataStr);
                        if (payload.type === 'content' && payload.data) {
                            accumulatedContent += payload.data;
                        }
                    } catch (e) {
                        accumulatedContent += dataStr;
                    }
                    scheduleRender(accumulatedContent);
                }

                // 确保最后一次渲染完成
                if (renderTimer) {
                    clearTimeout(renderTimer);
                    updateAssistantMessage(accumulatedContent);
                    renderTimer = null;
                }

                Debug.success('请求处理完成', {
                    totalChunks: chunkCount,
                    totalContent: accumulatedContent.length,
                    duration: lastChunkTime && firstChunkTime ? (lastChunkTime - firstChunkTime) + 'ms' : 'N/A'
                });

                if (accumulatedContent.length === 0) {
                    updateAssistantMessage('未收到任何回复内容');
                }

            } catch (error) {
                Debug.error('请求失败', { message: error.message });
                updateAssistantMessage('❌ 请求失败：' + error.message);
            } finally {
                isSending = false;
                sendBtn.disabled = false;
                userInput.disabled = false;
                userInput.focus();
                pendingContent = '';
                currentMsgDiv = null;
            }
        }

        sendBtn.addEventListener('click', sendChat);
        
        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendChat();
            }
        });

        Debug.success('页面加载完成，准备就绪');
    </script>
</body>
</html>
